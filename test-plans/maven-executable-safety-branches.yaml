# Test Plan: vscode-maven — Executable Path Safety Branches
#
# Covers the two non-abort branches of PR #1152's promptForExecutableConfirmation:
#
#   1. "Use Default Maven"  → getMaven() falls through to defaultMavenExecutable()
#                             and the Maven output channel logs
#                             `Falling back to system Maven`.
#      "use-default" is NOT cached, so a second invocation re-prompts.
#
#   2. "Allow"              → path is recorded in confirmedExecutablePaths for
#                             the session. A subsequent invocation with the
#                             same path must NOT re-prompt.
#
# Prerequisites:
#   - vscode-maven built (dist/extension.js present)
#   - JDK installed and system `mvn` on PATH (so the "Use Default" fallback
#     doesn't error out before our log assertion runs)
#
# Usage: npx autotest run test-plans/maven-executable-safety-branches.yaml

name: "vscode-maven — Executable Path Safety Branches"
description: |
  Trusted workspace + relative maven.executable.path: click "Use Default
  Maven" on the first prompt and assert the fall-back log line, then click
  "Allow" on the second prompt and assert the decision is cached (no dialog
  on the third invocation).

setup:
  extension: "vscjava.vscode-maven"
  extensions:
    - "redhat.java"
  extensionPath: "../../vscode-maven"
  workspace: "../test/projects/maven"
  vscodeVersion: "stable"
  # Relative path → not absolute → path.isAbsolute() returns false →
  # promptForExecutableConfirmation is shown on every getMaven() call until
  # the user Allows (which caches the path for the session).
  workspaceSettings:
    maven.executable.path: "./fake-mvn"
  timeout: 120

steps:
  - id: "wait-java-ls"
    action: "waitForLanguageServer"
    timeout: 120

  # ──────────────────────────────────────────────────────────
  # Branch 1: "Use Default Maven"
  # ──────────────────────────────────────────────────────────
  - id: "invoke-first"
    action: "run command Maven: Execute Commands..."

  - id: "pick-compile-first"
    action: "select compile option"

  - id: "click-use-default"
    action: "clickDialogButton Use Default Maven"
    verify: "Safety modal appeared and Use Default Maven was clicked"

  - id: "wait-fallback-log"
    action: "wait 6 seconds"
    # No `verify:` freeform — the fallback line is written to a hidden
    # output channel; there is no expected on-screen change. The next
    # step's `verifyOutputChannel.contains` is the source of truth.

  - id: "assert-fallback-log"
    action: "wait 1 second"
    # No `verify:` freeform — only the deterministic output-channel
    # assertion below decides pass/fail.
    verifyOutputChannel:
      channel: "Maven for Java"
      contains: "Falling back to system Maven"

  # ──────────────────────────────────────────────────────────
  # Branch 2: "Allow" — must cache, so third invocation has no dialog
  # ──────────────────────────────────────────────────────────
  - id: "invoke-second"
    action: "run command Maven: Execute Commands..."

  - id: "pick-compile-second"
    action: "select compile option"

  - id: "click-allow"
    action: "clickDialogButton Allow"
    verify: "Safety modal is dismissed after clicking Allow — BEFORE shows the modal with the 'Allow' button visible; AFTER shows the modal gone."

  - id: "wait-after-allow"
    action: "wait 3 seconds"

  - id: "invoke-third"
    action: "run command Maven: Execute Commands..."

  - id: "pick-compile-third"
    action: "select compile option"

  - id: "settle-for-possible-dialog"
    action: "wait 5 seconds"
    # No `verify:` — negative-assertion preparatory wait. The decisive
    # check is the next step's `verifyDialog.visible: false`.

  # Third invocation: ./fake-mvn is in confirmedExecutablePaths → getMaven
  # returns "safe" immediately → no showWarningMessage call → no modal.
  - id: "assert-no-dialog-after-allow"
    action: "wait 1 second"
    # No `verify:` freeform — only `verifyDialog.visible:false` decides
    # pass/fail. The third invocation should NOT re-prompt because Allow
    # cached the path in `confirmedExecutablePaths`.
    verifyDialog:
      visible: false
