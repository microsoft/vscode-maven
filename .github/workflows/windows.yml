name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Three stages:
#   build       - lint, compile, vsce package the extension once. Output: a tarball
#                 of the built workspace (incl. node_modules + .vsix) that the autotest
#                 matrix jobs hydrate.
#   list-plans  - discover the set of autotest plans that apply to this OS via
#                 scripts/list-autotest-plans.js (honors per-plan platforms/skipPlatforms),
#                 emit a JSON array consumed by the matrix below.
#   autotest    - one matrix job per plan, runs strictly that plan and uploads its
#                 results as a per-plan artifact. fail-fast: false so one flaky
#                 plan does not cancel its siblings.
jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node.js modules
        run: npm install

      - name: Install VSCE
        run: npm install -g @vscode/vsce

      - name: Linting
        run: npm run tslint

      - name: TSC Compile
        run: npm run compile

      - name: Build OSGi bundle
        run: npm run build-plugin

      - name: Build VSIX file
        run: vsce package

      - name: Archive workspace
        shell: bash
        run: tar --exclude='./.git' --exclude='./workspace.tar' -cf workspace.tar .

      - name: Upload workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: workspace.tar
          if-no-files-found: error
          retention-days: 1

  list-plans:
    name: Discover plans (Windows)
    runs-on: ubuntu-latest
    outputs:
      plans: ${{ steps.list.outputs.plans }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: list
        env:
          AUTOTEST_PLATFORM: win32
        run: |
          PLANS=$(node scripts/list-autotest-plans.js)
          echo "Discovered plans for win32: $PLANS"
          echo "plans=$PLANS" >> "$GITHUB_OUTPUT"

  autotest:
    name: Autotest (Windows) / ${{ matrix.plan }}
    needs: [build, list-plans]
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        plan: ${{ fromJSON(needs.list-plans.outputs.plans) }}
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: build-windows

      - name: Restore workspace
        shell: bash
        run: |
          tar -xf workspace.tar
          rm workspace.tar

      - name: Install autotest CLI
        run: npm install -g @vscjava/vscode-autotest

      - name: Run plan ${{ matrix.plan }}
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
        run: autotest run test-plans/${{ matrix.plan }}.yaml

      - name: Write Job Summary
        if: always()
        shell: bash
        run: |
          if [ -f test-results/summary.md ]; then
            cat test-results/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload autotest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autotest-results-windows-${{ matrix.plan }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Print language server Log if job failed
        if: ${{ failure() }}
        run: Get-ChildItem -Path $env:APPDATA/Code/User/workspaceStorage/*/redhat.java/jdt_ws/.metadata/.log | cat
