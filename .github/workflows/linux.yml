name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y libxkbfile-dev pkg-config libsecret-1-dev libxss1 dbus xvfb libgtk-3-0 libgbm1
        sudo /usr/bin/Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        sleep 3
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'adopt'

    - name: Setup Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Node.js modules
      run: npm install

    - name: Install VSCE
      run: npm install -g @vscode/vsce

    - name: Linting
      run: npm run tslint

    - name: TSC Compile
      run: npm run compile

    - name: Build OSGi bundle
      run: npm run build-plugin

    - name: Build VSIX file
      run: vsce package

    - name: Install autotest CLI
      run: npm install -g @vscjava/vscode-autotest

    - name: Run E2E test plans
      env:
        AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
        AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      run: |
        xvfb-run -a npm run test:autotest

    - name: Write Job Summary
      if: always()
      run: |
        if [ -f test-results/summary.md ]; then
          cat test-results/summary.md >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload autotest results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: autotest-results-linux
        path: test-results/
        if-no-files-found: ignore
        retention-days: 14

    - name: Print language server Log if job failed
      if: ${{ failure() }}
      run: find $HOME/.config/Code/User/workspaceStorage/*/redhat.java/jdt_ws/.metadata/.log -print -exec cat '{}' \;;
